<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Reaping</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

  <!-- Texture generation, world, meta & audio -->
  <script src="src/TextureFactory.js"></script>
  <script src="src/WorldGenerator.js"></script>
  <script src="src/MetaProgress.js"></script>
  <script src="src/MusicManager.js"></script>
  <script src="src/SoundManager.js"></script>

  <!-- Data (no dependencies) -->
  <script src="src/data/enemies.js"></script>
  <script src="src/data/weapons.js"></script>
  <script src="src/data/upgrades.js"></script>
  <script src="src/data/passives.js"></script>

  <!-- Entities -->
  <script src="src/entities/Projectile.js"></script>
  <script src="src/entities/EnemyProjectile.js"></script>
  <script src="src/entities/Player.js"></script>
  <script src="src/entities/Enemy.js"></script>

  <!-- Systems -->
  <script src="src/systems/JuiceManager.js"></script>
  <script src="src/systems/CombatSystem.js"></script>
  <script src="src/systems/WaveManager.js"></script>
  <script src="src/systems/UpgradeManager.js"></script>

  <!-- Scenes -->
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/MainMenuScene.js"></script>
  <script src="src/scenes/CharacterSelectScene.js"></script>
  <script src="src/scenes/GameScene.js"></script>
  <script src="src/scenes/UpgradeScene.js"></script>
  <script src="src/scenes/PauseScene.js"></script>
  <script src="src/scenes/CampOverlayScene.js"></script>
  <script src="src/scenes/SettingsScene.js"></script>
  <script src="src/scenes/CampfireScene.js"></script>
  <script src="src/scenes/GameOverScene.js"></script>

  <!-- Entry point -->
  <script src="src/main.js"></script>
</body>
</html>
